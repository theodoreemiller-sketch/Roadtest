    opts: ["The door is too hot to touch safely", "Opening the door introduces oxygen that feeds the fire", "The door may fall off and cause injury", "Opening the door is against Illinois law during emergencies"],
    ans: 1
  },

  // ── HAZARDOUS MATERIALS (4) ──
  {
    cat: "Hazardous Materials",
    q: "What information must shippers include in the item description on shipping papers for hazardous materials?",
    opts: ["The vehicle's license plate number", "The name of the hazard class", "The driver's CDL number", "The weight of the shipment in metric tons"],
    ans: 1
  },
  {
    cat: "Hazardous Materials",
    q: "What type of label must appear on hazardous material containers?",
    opts: ["A 6-inch square label", "A 4-inch diamond label", "A 2-foot rectangle label", "A 1-foot circle label"],
    ans: 1
  },
  {
    cat: "Hazardous Materials",
    q: "If a diamond label does not fit on a hazardous material container, what must the shipper do?",
    opts: ["Omit the label and note it on the shipping papers", "Use a smaller non-standard shape", "Place the label on a tag attached to the container", "Write the hazard class directly on the container with a marker"],
    ans: 2
  },
  {
    cat: "Hazardous Materials",
    q: "Where must the name of the hazard class appear on hazardous material shipments?",
    opts: ["On the outside of the vehicle only", "On a placard visible to the driver only", "In the item description on the shipping papers", "On a tag attached to the vehicle door"],
    ans: 2
  }

];

const letters = ['A','B','C','D'];
let current = 0;
let answers = new Array(questions.length).fill(null);
let revealed = new Array(questions.length).fill(false);
let quizDone = false;

function getStats() {
  const answered = answers.filter(a => a !== null).length;
  const correct = answers.filter((a,i) => a !== null && a === questions[i].ans).length;
  return { answered, correct };
}

function render() {
  const app = document.getElementById('app');
  if (quizDone) { renderResults(app); return; }

  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  const isRevealed = revealed[current];
  const userAns = answers[current];
  const { answered, correct } = getStats();

  app.innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">${current+1}/${questions.length}</div>
        <div class="stat-lbl">Question</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${answered}</div>
        <div class="stat-lbl">Answered</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${correct}</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${answered > 0 ? Math.round((correct / answered) * 100) : 0}%</div>
        <div class="stat-lbl">Score</div>
      </div>
    </div>

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="pager">Question ${current+1} of ${questions.length}</div>

    <div class="q-block">
      <span class="q-category">${q.cat}</span>
      <div class="q-text">${q.q}</div>
      ${q.opts.map((o, i) => {
        let cls = 'opt';
        if (isRevealed) {
          if (i === q.ans) cls += ' correct';
          else if (i === userAns && i !== q.ans) cls += ' wrong';
        } else if (i === userAns) cls += ' selected';
        return `<div class="${cls}" onclick="selectOpt(${i})">
          <span class="opt-letter">${letters[i]}</span>
          <span class="opt-text">${o}</span>
        </div>`;
      }).join('')}
      ${isRevealed ? `
        <div class="feedback ${userAns === q.ans ? 'correct' : 'wrong'}">
          ${userAns === q.ans
            ? '✓ Correct!'
            : `✗ The correct answer is ${letters[q.ans]}: ${q.opts[q.ans]}`}
        </div>` : ''}
    </div>

    <div class="nav">
      <button onclick="prevQ()" ${current === 0 ? 'disabled' : ''}>← Back</button>
      <div style="display:flex;gap:8px;">
        ${!isRevealed && userAns !== null
          ? `<button onclick="checkAns()">Check answer</button>` : ''}
        ${current < questions.length - 1
          ? `<button class="primary" onclick="nextQ()">Next →</button>`
          : `<button class="primary" onclick="finish()">Finish &amp; see score</button>`}
      </div>
    </div>
  `;
}

function selectOpt(i) {
  if (revealed[current]) return;
  answers[current] = i;
  render();
}
function checkAns() { revealed[current] = true; render(); }
function nextQ() { if (current < questions.length - 1) { current++; render(); } }
function prevQ() { if (current > 0) { current--; render(); } }
function finish() { quizDone = true; render(); }

function renderResults(app) {
  const correct = answers.filter((a,i) => a === questions[i].ans).length;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);
  const pass = pct >= 80;

  const cats = {};
  questions.forEach((q, i) => {
    if (!cats[q.cat]) cats[q.cat] = { total: 0, correct: 0 };
    cats[q.cat].total++;
    if (answers[i] === q.ans) cats[q.cat].correct++;
  });

  const breakdownRows = Object.entries(cats).map(([cat, data]) => {
    const cpct = Math.round((data.correct / data.total) * 100);
    return `<div class="sb-row">
      <span class="sb-cat">${cat}</span>
      <div class="sb-bar-bg"><div class="sb-bar-fill" style="width:${cpct}%"></div></div>
      <span class="sb-score">${data.correct}/${data.total}</span>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="score-card">
      <div class="score-big">${pct}%</div>
      <div class="score-sub">${correct} of ${total} correct</div>
      <div class="score-verdict ${pass ? 'pass' : 'fail'}">
        ${pass ? '✓ Passing score — you are ready!' : '✗ Keep studying — aim for 80% or higher'}
      </div>
    </div>

    <div class="section-breakdown">
      <h2>Score by topic</h2>
      ${breakdownRows}
    </div>

    <div class="answer-key">
      <h2>Answer key</h2>
      ${questions.map((q, i) => {
        const ok = answers[i] === q.ans;
        return `<div class="ak-row">
          <span class="ak-q">Q${i+1}</span>
          <span class="ak-dot ${ok ? 'dot-green' : 'dot-red'}"></span>
          <span class="ak-letter">${letters[q.ans]}</span>
          <span class="ak-text">${q.opts[q.ans]}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="restart-row">
      <button class="primary" onclick="restart()">Retake quiz</button>
    </div>
  `;
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  revealed = new Array(questions.length).fill(false);
  quizDone = false;
  render();
}

render();
</script>
</body>
</html>
